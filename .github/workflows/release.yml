name: Android CI/CD (Auto Release APK)

on:
  push:
    tags:
      - '*' # پروسه با زدن هر تگی شروع می‌شود

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    # بررسی هوشمند وجود فایل gradlew در ریشه پروژه
    - name: Check and Make gradlew executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          echo "gradlew found and set to executable."
        elif [ -f "app/gradlew" ]; then
          echo "ERROR: gradlew is inside 'app' folder! It must be in the root directory."
          exit 1
        else
          echo "ERROR: gradlew file is missing completely from the repository!"
          exit 1
        fi

    # اجرای عملیات ساخت APK با ساختار امن
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # آپلود فایل در بخش ریلیز
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
